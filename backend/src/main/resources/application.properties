spring.application.name=coinpulse-backend
server.port=8080

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:coinpulse;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / seed ---
# Hibernate creates the schema from entities; DatabaseSeeder then runs data.sql
# (Boot's own script init is disabled because it fires before the schema exists).
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=never
spring.jpa.open-in-view=false

# --- JWT ---
# Dev secret (HS256, min 256 bits). Override in deploy via env var COINPULSE_JWT_SECRET.
coinpulse.jwt.secret=coinpulse-dev-secret-key-change-me-in-production-0123456789
coinpulse.jwt.expiration-ms=86400000

# --- CORS ---
# Comma-separated allowed origins; add the GitHub Pages origin once the frontend is live.
coinpulse.cors.allowed-origins=http://localhost:5173,https://darkocvetkovic.github.io

# --- Uploads ---
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

# --- OpenAPI / Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html

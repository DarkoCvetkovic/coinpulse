name: Daily tests

on:
  schedule:
    # 06:00 UTC = 08:00 CEST (07:00 CET in winter), Monday to Friday
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-tests
  cancel-in-progress: false

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B -ntp verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 14

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CYPRESS_STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      CYPRESS_STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      CYPRESS_LOCKED_USERNAME: ${{ secrets.LOCKED_USERNAME }}
      CYPRESS_LOCKED_PASSWORD: ${{ secrets.LOCKED_PASSWORD }}
      CYPRESS_ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      CYPRESS_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Boot the app
        uses: ./.github/actions/boot-app

      - name: Set up Node for the suite
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests-cypress/package-lock.json

      - name: Install dependencies
        working-directory: tests-cypress
        run: npm ci

      - name: Smoke suite (fast gate)
        working-directory: tests-cypress
        run: npm run test:smoke

      - name: Full suite
        working-directory: tests-cypress
        run: npm run cy:run

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-report
          path: tests-cypress/cypress/reports/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: cypress-screenshots
          path: tests-cypress/cypress/screenshots/
          retention-days: 14

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      LOCKED_USERNAME: ${{ secrets.LOCKED_USERNAME }}
      LOCKED_PASSWORD: ${{ secrets.LOCKED_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Boot the app
        uses: ./.github/actions/boot-app

      - name: Set up Node for the suite
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests-playwright/package-lock.json

      - name: Install dependencies
        working-directory: tests-playwright
        run: npm ci

      - name: Install browsers
        working-directory: tests-playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Smoke suite (fast gate)
        working-directory: tests-playwright
        run: npm run test:smoke

      - name: Full suite (three browsers)
        working-directory: tests-playwright
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: tests-playwright/playwright-report/
          retention-days: 14

  selenium:
    name: Selenium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COINPULSE_BROWSER: chrome
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      LOCKED_USERNAME: ${{ secrets.LOCKED_USERNAME }}
      LOCKED_PASSWORD: ${{ secrets.LOCKED_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Boot the app
        uses: ./.github/actions/boot-app

      - name: Smoke suite (fast gate)
        working-directory: tests-selenium
        run: ./mvnw -B -ntp test -Dtest='*SmokeTest'

      - name: Full suite
        working-directory: tests-selenium
        run: ./mvnw -B -ntp test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: selenium-allure-results
          path: tests-selenium/target/allure-results/
          retention-days: 14

  jmeter:
    name: JMeter baseline
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Boot the app
        uses: ./.github/actions/boot-app
        with:
          frontend: 'false'

      - name: Write user properties
        working-directory: tests-jmeter
        env:
          STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
          STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
        run: |
          printf 'coinpulse.standard.username=%s\ncoinpulse.standard.password=%s\n' \
            "$STANDARD_USERNAME" "$STANDARD_PASSWORD" > user.properties

      - name: Run the baseline scenario
        working-directory: tests-jmeter
        run: ./mvnw -B -ntp clean verify

      - name: Upload HTML dashboard
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jmeter-dashboard
          path: tests-jmeter/target/jmeter/reports/
          retention-days: 14

  notify:
    name: Email report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-unit, frontend-unit, cypress, playwright, selenium, jmeter]
    if: always()
    steps:
      - name: Compose the report
        id: report
        env:
          BACKEND_UNIT: ${{ needs.backend-unit.result }}
          FRONTEND_UNIT: ${{ needs.frontend-unit.result }}
          CYPRESS: ${{ needs.cypress.result }}
          PLAYWRIGHT: ${{ needs.playwright.result }}
          SELENIUM: ${{ needs.selenium.result }}
          JMETER: ${{ needs.jmeter.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          label() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              *) echo "$(echo "$1" | tr '[:lower:]' '[:upper:]')" ;;
            esac
          }
          overall=PASSED
          passed=0
          for r in "$BACKEND_UNIT" "$FRONTEND_UNIT" "$CYPRESS" "$PLAYWRIGHT" "$SELENIUM" "$JMETER"; do
            if [ "$r" = "success" ]; then passed=$((passed + 1)); else overall=FAILED; fi
          done
          {
            echo "CoinPulse daily test report - $(date -u +%Y-%m-%d)"
            echo
            echo "Backend unit:    $(label "$BACKEND_UNIT")"
            echo "Frontend unit:   $(label "$FRONTEND_UNIT")"
            echo "Cypress E2E:     $(label "$CYPRESS")"
            echo "Playwright E2E:  $(label "$PLAYWRIGHT")"
            echo "Selenium E2E:    $(label "$SELENIUM")"
            echo "JMeter baseline: $(label "$JMETER")"
            echo
            echo "Run details and downloadable reports:"
            echo "$RUN_URL"
          } > body.txt
          echo "subject=CoinPulse daily tests: $overall ($passed/6)" >> "$GITHUB_OUTPUT"

      - name: Send the email
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: CoinPulse CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.report.outputs.subject }}
          body: file://body.txt

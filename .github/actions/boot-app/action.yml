name: Boot CoinPulse
description: Starts the backend (and optionally the frontend dev server) on the runner

inputs:
  frontend:
    description: Whether to boot the frontend dev server on port 5173
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
        cache: maven

    - name: Start the backend
      shell: bash
      working-directory: backend
      run: nohup ./mvnw -B -ntp spring-boot:run > backend.log 2>&1 &

    - name: Set up Node 24
      if: inputs.frontend == 'true'
      uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      if: inputs.frontend == 'true'
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Start the frontend
      if: inputs.frontend == 'true'
      shell: bash
      working-directory: frontend
      run: nohup npm run dev > frontend.log 2>&1 &

    - name: Wait for the backend
      shell: bash
      run: |
        for i in $(seq 1 90); do
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/test/reset || true)
          if [ "$code" = "200" ]; then
            echo "Backend is up"
            exit 0
          fi
          sleep 2
        done
        echo "Backend did not start in time" >&2
        tail -n 50 backend/backend.log >&2 || true
        exit 1

    - name: Wait for the frontend
      if: inputs.frontend == 'true'
      shell: bash
      run: |
        for i in $(seq 1 60); do
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173/ || true)
          if [ "$code" = "200" ]; then
            echo "Frontend is up"
            exit 0
          fi
          sleep 2
        done
        echo "Frontend did not start in time" >&2
        tail -n 50 frontend/frontend.log >&2 || true
        exit 1
